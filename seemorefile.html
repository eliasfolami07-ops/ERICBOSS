  <style>

    .gallery-page{
    padding: 80px 10%;
    background: #140904;
    min-height: 100vh;
}

.gallery-page h1{
    color: white;
    text-align: center;
    margin-bottom: 40px;
    font-size: 3rem;
}
   .logo{
    width: 90%;
    max-width: 50px;
    display: block;
    margin: auto;
       justify-content:center;
   }
.gallery-container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    gap: 20px;
}

.gallery-container img{
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 15px;
    transition: 0.4s;
}

.gallery-container img:hover{
    transform: scale(1.03);
}
      

    .footer{
    background: #140904;
    color: white;
    padding: 60px 10%;
}

.footer-container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 40px;
}

.footer h2,
.footer h3{
    margin-bottom: 15px;
}

.footer a{
    display: block;
    color: #ddd;
    text-decoration: none;
    margin-bottom: 10px;
    transition: 0.3s;
}
      @media(max-width:768px){

    .logo{
        max-width: 300px;
    }
      }

.footer a:hover{
    color: orange;
}

.footer-bottom{
    margin-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 20px;
    text-align: center;
    color: #aaa;
}
  </style>
