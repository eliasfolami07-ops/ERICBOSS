  <style>

      .hero-logo{
  width: 380px;
  max-width: 80%;
  margin-bottom: 20px;

  /* Premium effect */
  filter: drop-shadow(0 4px 12px rgba(212,175,55,0.35));

  transition: 0.3s ease;
}

.hero-logo:hover{
  transform: scale(1.03);
}
      .gallery-page{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
      }

    .gallery-page{
    padding: 80px 10%;
    background: #140904;
    min-height: 100vh;
}

.gallery-page h1{
    color: white;
    text-align: center;
    margin-bottom: 40px;
    font-size: 3rem;
}

.gallery-container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    gap: 20px;
}

.gallery-container img{
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 15px;
    transition: 0.4s;
}

.gallery-container img:hover{
    transform: scale(1.03);
}

    .footer{
    background: #140904;
    color: white;
    padding: 60px 10%;
}

.footer-container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 40px;
}

.footer h2,
.footer h3{
    margin-bottom: 15px;
}

.footer a{
    display: block;
    color: #ddd;
    text-decoration: none;
    margin-bottom: 10px;
    transition: 0.3s;
}

.footer a:hover{
    color: orange;
}

.footer-bottom{
    margin-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 20px;
    text-align: center;
    color: #aaa;
}
  </style>
